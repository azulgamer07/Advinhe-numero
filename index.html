<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adivinhe o numero</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container" id="card">
      <h1>🎯 Adivinhe o numero</h1>
      <p>Entre 1 e 100</p>

      <p id="tentativasrestantes"></p>
      <div class="barra-container">
  <div id="barraProximidade"></div>
</div>

      <input type="number" id="chute" placeholder="Digite aqui" />
      <br />

      <!-- ✅ corrigido -->
     <div class="controls">
        <button id="botao" onclick="verificarPalpite()">Chutar</button>
        <button onclick="reiniciar()">Reiniciar</button>

      <div class="volume-container">
          <span id="iconeVolume">🔊</span>
          <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
      </div>

      <p id="mensagem"></p>
    </div>
    <audio id="somAcerto" src="acertou-mizeravijk.mp3"></audio>
    <audio id="somErro" src="errou-efeito-sonoro.mp3"></audio>
    <audio id="somGameOver" src="morte-roblox.mp3"></audio>

    <script src="script.js"></script>
  </body>
</html>
